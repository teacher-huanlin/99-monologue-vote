<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>九十九出独角戏第二季</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fef9f4;
  --card-bg: #ffffff;
  --text: #3d3027;
  --text-secondary: #8c7b6d;
  --accent: #e86a58;
  --accent-light: #f8a48b;
  --accent-soft: #fef0ec;
  --gold: #d4a853;
  --gold-light: #f0d78c;
  --border: #ece3d8;
  --shadow: 0 2px 12px rgba(0,0,0,0.05);
  --shadow-lg: 0 8px 30px rgba(0,0,0,0.08);
  --radius: 16px;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --font-sans: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 120px;
}

/* ===== Hero ===== */
.hero {
  background: linear-gradient(135deg, #1ea669 0%, #5db56d 50%, #a8d68e 100%);
  color: #fff;
  padding: 56px 24px 52px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at 25% 40%, rgba(255,255,255,0.18) 0%, transparent 55%),
    radial-gradient(ellipse at 70% 60%, rgba(255,255,255,0.1) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 20%, rgba(255,255,255,0.18) 0%, transparent 60%);
}
.hero::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: linear-gradient(to top, var(--bg), transparent);
}
.hero-content { position: relative; z-index: 1; }
.hero .badge {
  display: inline-block;
  padding: 5px 18px;
  background: rgba(255,255,255,0.25);
  backdrop-filter: blur(4px);
  border-radius: 50px;
  font-size: 13px;
  letter-spacing: 2px;
  margin-bottom: 18px;
  font-weight: 500;
}
.hero h1 {
  font-size: clamp(26px, 5.5vw, 46px);
  font-weight: 800;
  letter-spacing: 3px;
  margin-bottom: 14px;
  text-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
.hero .subtitle {
  font-size: clamp(15px, 2.5vw, 19px);
  color: rgba(255,255,255,0.9);
  margin-bottom: 28px;
  font-weight: 500;
}
.hero .rules {
  display: inline-flex;
  flex-wrap: wrap;
  gap: 8px 28px;
  font-size: 14px;
  color: rgba(255,255,255,0.8);
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(4px);
  padding: 12px 24px;
  border-radius: 50px;
}
.hero .rules span { display: inline-flex; align-items: center; gap: 8px; }
.hero .rules .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #fff;
  display: inline-block;
  opacity: 0.7;
}

/* ===== Container ===== */
.container { max-width: 1320px; margin: 0 auto; padding: 28px 16px; }

/* ===== Section Header ===== */
.section-header {
  text-align: center;
  margin-bottom: 24px;
}
.section-header h2 {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: 1px;
}
.section-header p {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 6px;
}

/* ===== Artist Grid ===== */
.artist-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 20px;
  padding: 4px 0;
}

/* ===== Artist Card ===== */
.artist-card {
  background: var(--card-bg);
  border-radius: 0;
  overflow: hidden;
  cursor: pointer;
  transition: var(--transition);
  border: 3px solid transparent;
  box-shadow: var(--shadow);
  position: relative;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.artist-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 36px rgba(0,0,0,0.1);
}
.artist-card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(232,106,88,0.2), var(--shadow-lg);
  transform: translateY(-6px);
}
.artist-card.voted-by-me {
  border-color: var(--accent-light);
}

/* Poster */
.card-poster {
  width: 100%;
  aspect-ratio: 3/4;
  position: relative;
  overflow: hidden;
}
.card-poster .poster-bg {
  width: 100%; height: 100%;
  position: absolute; inset: 0;
}
.card-poster .poster-overlay {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.12);
  padding: 16px;
}
.card-poster .poster-name {
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  letter-spacing: 1.5px;
  line-height: 1.3;
}
.card-poster .poster-no {
  position: absolute;
  top: 12px;
  left: 14px;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: rgba(255,255,255,0.94);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 800;
  color: var(--accent);
  z-index: 2;
}
.card-poster .selected-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent);
  display: none;
  align-items: center; justify-content: center;
  z-index: 3;
  animation: popIn 0.3s ease;
  box-shadow: 0 2px 8px rgba(232,106,88,0.4);
}
.artist-card.selected .selected-badge { display: flex; }
@keyframes popIn {
  0% { transform: scale(0); }
  60% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.selected-badge svg { width: 16px; height: 16px; color: #fff; }

/* Card Info */
.card-info {
  padding: 14px 16px;
  text-align: center;
}
.card-info .artist-name {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}
.card-info .artist-cat {
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--accent-soft);
  display: inline-block;
  padding: 3px 12px;
  border-radius: 10px;
}

/* ===== Vote Bar (Bottom Fixed) ===== */
.vote-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card-bg);
  border-top: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 100;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.05);
}
.vote-bar .selected-summary {
  display: flex; align-items: center; gap: 12px;
  flex: 1; min-width: 0; overflow-x: auto;
}
.vote-bar .selected-count {
  font-size: 14px; color: var(--text-secondary); white-space: nowrap;
}
.vote-bar .selected-count strong {
  color: var(--accent);
  font-size: 18px;
  font-weight: 800;
}
.vote-bar .selected-pills {
  display: flex; gap: 6px; flex-wrap: nowrap;
}
.vote-bar .selected-pill {
  padding: 5px 14px;
  background: var(--accent);
  color: #fff;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.vote-bar .submit-btn {
  padding: 13px 36px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: 50px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
  letter-spacing: 1px;
  box-shadow: 0 4px 16px rgba(232,106,88,0.25);
}
.vote-bar .submit-btn:hover {
  transform: scale(1.04);
  box-shadow: 0 6px 24px rgba(232,106,88,0.35);
}
.vote-bar .submit-btn:disabled {
  background: var(--accent-soft);
  color: #c4a59a;
  cursor: not-allowed;
  transform: none;
  box-shadow: none;
  opacity: 1;
}
.vote-bar .submit-btn.ready {
  background: var(--accent);
  box-shadow: 0 4px 20px rgba(232,106,88,0.35);
  animation: subtlePulse 2s ease-in-out infinite;
}
@keyframes subtlePulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(232,106,88,0.35); }
  50% { box-shadow: 0 4px 32px rgba(232,106,88,0.5); }
}

/* ===== Voted State ===== */
.vote-done-banner {
  text-align: center;
  padding: 36px 28px;
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  margin-bottom: 28px;
  border: 1.5px solid var(--accent-soft);
}
.vote-done-banner .check-icon {
  width: 68px; height: 68px;
  border-radius: 50%;
  background: linear-gradient(135deg, #66bb6a, #43a047);
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
  box-shadow: 0 4px 16px rgba(76,175,80,0.3);
}
.vote-done-banner h3 { font-size: 22px; margin-bottom: 10px; color: var(--text); }
.vote-done-banner p { color: var(--text-secondary); font-size: 15px; line-height: 1.8; }
.vote-done-banner .voted-list {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center; margin: 14px 0 6px;
}
.vote-done-banner .voted-tag {
  padding: 6px 16px;
  background: var(--accent-soft);
  color: var(--accent);
  border-radius: 20px;
  font-size: 14px;
  font-weight: 600;
}

/* ===== Modal ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(2px);
  z-index: 200;
  display: flex; align-items: flex-start; justify-content: center;
  padding: 20px;
  overflow-y: auto;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: #fff;
  border-radius: 20px;
  padding: 36px 32px;
  max-width: 460px;
  width: 100%;
  max-height: calc(100vh - 40px);
  overflow-y: auto;
  box-shadow: 0 24px 64px rgba(0,0,0,0.15);
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: scale(0.92) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.modal h3 { font-size: 22px; margin-bottom: 14px; text-align: center; color: var(--text); }
.modal .modal-sub {
  text-align: center;
  color: var(--text-secondary);
  font-size: 14px;
  margin-bottom: 6px;
}
.modal .confirm-list {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; margin: 18px 0;
}
.modal .confirm-list .confirm-pill {
  padding: 9px 20px;
  background: var(--accent);
  color: #fff;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1px;
}
.modal .warning-text {
  text-align: center;
  font-size: 13px;
  color: #ef6c6c;
  margin: 10px 0 20px;
  font-weight: 600;
}
.modal .modal-actions {
  display: flex; gap: 14px;
  justify-content: center;
  margin-top: 6px;
}
.modal .btn-cancel {
  padding: 11px 32px;
  border: 1.5px solid var(--border);
  background: transparent;
  border-radius: 50px;
  cursor: pointer;
  font-size: 15px;
  color: var(--text-secondary);
  transition: var(--transition);
  font-weight: 500;
}
.modal .btn-cancel:hover { border-color: #ccc; color: var(--text); }
.modal .btn-confirm {
  padding: 11px 32px;
  border: none;
  background: var(--accent);
  color: #fff;
  border-radius: 50px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 700;
  transition: var(--transition);
  letter-spacing: 1px;
}
.modal .btn-confirm:hover { transform: scale(1.04); }

/* ===== Responsive ===== */
@media (max-width: 768px) {
  .artist-grid {
    grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
    gap: 14px;
  }
  .card-poster .poster-name { font-size: 15px; }
  .card-info .artist-name { font-size: 14px; }
  .card-info .artist-cat { font-size: 11px; }
  .vote-bar {
    flex-wrap: wrap;
    gap: 12px;
    padding: 14px 18px;
  }
  .vote-bar .selected-summary { order: 1; width: 100%; }
  .vote-bar .submit-btn { order: 2; width: 100%; text-align: center; }
  .hero { padding: 40px 16px 44px; }
  .hero h1 { letter-spacing: 1.5px; }
  .hero .rules { padding: 10px 18px; gap: 6px 16px; font-size: 13px; }
}

@media (max-width: 400px) {
  .artist-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .hero h1 { font-size: 22px; }
  .hero .rules { font-size: 12px; padding: 8px 14px; }
  .vote-bar .selected-pill { font-size: 12px; padding: 4px 10px; }
  .hero .subtitle { font-size: 14px; }
}
</style>
</head>
<body>

<!-- Hero -->
<div style="background:#1ea669;color:#fff;text-align:center;padding:14px 20px;font-size:18px;font-weight:700;letter-spacing:2px;opacity:0.85;">活动已结束 · 感谢您的关注</div>
<header class="hero">
  <div class="hero-content">
    <div class="badge">THE 99 SOLOS · SEASON 2</div>
    <h1>九十九出独角戏第二季</h1>
    <p class="subtitle">为您欣赏的艺术家投出珍贵一票</p>
    <div class="rules">
      <span><span class="dot"></span>每天每位艺术家 1 票</span>
      <span><span class="dot"></span>0 点刷新</span>
      <span><span class="dot"></span>跨日可重复投票</span>
    </div>
  </div>
</header>

<div class="container">
  <div class="section-header">
    <h2>33 组参展艺术家</h2>
    <p>点击卡片为您欣赏的艺术家投票，每天每位艺术家 1 票</p>
  </div>

  <div id="vote-done-area"></div>
  <div class="artist-grid" id="artist-grid"></div>
</div>

<!-- Bottom Vote Bar -->
<div class="vote-bar" id="vote-bar">
  <div class="selected-summary">
    <span class="selected-count">已选 <strong id="selected-num">0</strong> 位</span>
    <div class="selected-pills" id="selected-pills"></div>
  </div>
  <button class="submit-btn" id="submit-btn" onclick="confirmVote()" disabled>确认投票</button>
</div>

<!-- Confirm Modal -->
<div class="modal-overlay" id="confirm-modal" style="display:none;">
  <div class="modal">
    <h3>🎭 确认今天的投票</h3>
    <p class="modal-sub">您将为以下艺术家各投 1 票：</p>
    <div class="confirm-list" id="confirm-list"></div>
    <p class="warning-text">同一艺术家明天 0 点后可再次投票</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">再想想</button>
      <button class="btn-confirm" onclick="submitVote()">确认提交</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// API
// ============================================================
const API_BASE = window.location.origin;
const VOTE_CLOSED = true;  // 活动已截止 - 硬编码

// Fingerprint: UUID stored in localStorage for deduplication
const FP_KEY = 'monologue_fingerprint_v3';
function getFingerprint() {
  let fp = localStorage.getItem(FP_KEY);
  if (!fp) {
    fp = crypto.randomUUID();
    localStorage.setItem(FP_KEY, fp);
  }
  return fp;
}

// ============================================================
// State
// ============================================================
let ARTISTS = [];
let selectedIds = [];
let myVotedIds = [];        // 指纹 (跨会话稳定) — 用于判断已投
let myTodayVotedIds = [];   // 今天已投的 id (决定 UI 状态)
let hasAlreadyVoted = false; // 今天是否已投过 (任一)
let isLoading = true;
const MAX_VOTES_PER_DAY = 33; // 每天最多给 33 个艺术家各投 1 票

async function loadArtistsFromAPI() {
  try {
    const res = await fetch(API_BASE + '/api/artists');
    if (!res.ok) throw new Error('API error');
    ARTISTS = await res.json();
    return true;
  } catch (e) {
    console.error('Failed to load artists:', e);
    return false;
  }
}

async function checkVotedStatus() {
  try {
    const fp = getFingerprint();
    const res = await fetch(API_BASE + '/api/check-fingerprint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fingerprint: fp }),
    });
    const data = await res.json();
    if (data.voted) {
      hasAlreadyVoted = true;
      myTodayVotedIds = data.voted_ids || data.voted_today || [];
    }
  } catch (e) {
    console.error('Failed to check vote status:', e);
  }
}

// ============================================================
// Poster Generator
// ============================================================
function posterHTML(artist) {
  const [c1, c2, c3] = artist.colors;
  if (artist.imageUrl) {
    return `
    <div class="poster-bg" style="background-image:url('${artist.imageUrl}');background-size:cover;background-position:center;">
    </div>
    <div class="poster-no">${artist.id}</div>
    <div class="selected-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>`;
  }
  return `
    <div class="poster-bg" style="background:linear-gradient(155deg,${c1} 0%,${c2} 55%,${c3} 100%)">
      <svg viewBox="0 0 200 260" style="position:absolute;inset:0;width:100%;height:100%;opacity:0.22" preserveAspectRatio="none">
        <circle cx="25%" cy="20%" r="30%" fill="rgba(255,255,255,0.18)"/>
        <circle cx="70%" cy="65%" r="38%" fill="rgba(0,0,0,0.05)"/>
        <polygon points="55,35 125,28 145,105 70,115" fill="rgba(255,255,255,0.07)"/>
        <rect x="15" y="185" width="65" height="5" rx="2.5" fill="rgba(255,255,255,0.22)"/>
        <rect x="95" y="210" width="85" height="4" rx="2" fill="rgba(255,255,255,0.13)"/>
        <line x1="25" y="85" x2="175" y2="78" stroke="rgba(255,255,255,0.09)" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="poster-no">${artist.id}</div>
    <div class="selected-badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>`;
}

// ============================================================
// Render
// ============================================================
function renderArtistGrid() {
  const grid = document.getElementById('artist-grid');
  
  if (isLoading) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px 24px;color:#8c7b6d;font-size:15px;">加载中...</div>`;
    return;
  }

  grid.innerHTML = ARTISTS.map(a => {
    const isSelected = selectedIds.includes(a.id);
    const isVotedToday = myTodayVotedIds.includes(a.id);
    const votedOverlay = isVotedToday
      ? `<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff;font-size:18px;font-weight:800;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.7),0 0 2px rgba(0,0,0,.5);z-index:3;pointer-events:none;white-space:nowrap;">今日已投</div>`
      : '';
    return `
      <div class="artist-card ${isSelected ? 'selected' : ''} ${isVotedToday ? 'voted-by-me' : ''}"
           data-id="${a.id}"
           onclick="toggleArtist(${a.id})"
           style="${isVotedToday ? 'cursor:not-allowed;opacity:0.55;' : ''}">
        <div class="card-poster">
          ${posterHTML(a)}
          ${votedOverlay}
        </div>
        <div class="card-info">
          <div class="artist-name">${a.name}</div>
          <div class="artist-cat">${a.cat}</div>
        </div>
      </div>`;
  }).join('');

  updateVoteBar();
  renderVoteDoneBanner();
}

function renderVoteDoneBanner() {
  const area = document.getElementById('vote-done-area');
  // 不再持续显示成功 banner (占篇幅), 用户投完弹窗已经告知, 已投的卡片在 grid 里已标灰
  area.innerHTML = '';
}

function updateVoteBar() {
  document.getElementById('selected-num').textContent = selectedIds.length;
  document.getElementById('selected-pills').innerHTML = selectedIds.map(id => {
    const a = ARTISTS.find(x => x.id === id);
    return a ? `<span class="selected-pill">${a.name}</span>` : '';
  }).join('');

  const submitBtn = document.getElementById('submit-btn');

  if (VOTE_CLOSED) {
    submitBtn.disabled = true;
    submitBtn.textContent = '投票已结束';
    submitBtn.style.opacity = '0.5';
    submitBtn.style.cursor = 'not-allowed';
    return;
  }

  if (isLoading) {
    submitBtn.textContent = '加载中...';
    submitBtn.disabled = true;
    submitBtn.classList.remove('ready');
    return;
  }

  document.getElementById('vote-bar').style.opacity = '1';

  // 已选数量 (排除已投过的)
  const pendingNew = selectedIds.filter(id => !myTodayVotedIds.includes(id));

  if (pendingNew.length > 0) {
    submitBtn.textContent = `确认投票 (${pendingNew.length} 位) ✨`;
    submitBtn.disabled = false;
    submitBtn.classList.add('ready');
  } else if (selectedIds.length > 0) {
    // 全是已投过的
    submitBtn.textContent = '这些艺术家今天已投过';
    submitBtn.disabled = true;
    submitBtn.classList.remove('ready');
  } else {
    submitBtn.textContent = '请选择艺术家 (每天每位 1 票)';
    submitBtn.disabled = true;
    submitBtn.classList.remove('ready');
  }
}

// ============================================================
// Interaction
// ============================================================
function toggleArtist(id) {
  if (VOTE_CLOSED) return;
  // 今天已投过的不能选 (明天 0 点后自动解锁)
  if (myTodayVotedIds.includes(id)) {
    shakeElement(document.querySelector(`.artist-card[data-id="${id}"]`));
    return;
  }
  const idx = selectedIds.indexOf(id);
  if (idx >= 0) {
    selectedIds.splice(idx, 1);
  } else {
    selectedIds.push(id);
  }
  renderArtistGrid();
}

function shakeElement(el) {
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'shake 0.4s ease';
  setTimeout(() => el.style.animation = '', 400);
}

const shakeStyle = document.createElement('style');
shakeStyle.textContent = `
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    50% { transform: translateX(6px); }
    75% { transform: translateX(-4px); }
  }`;
document.head.appendChild(shakeStyle);

// ============================================================
// Modal
// ============================================================
function confirmVote() {
  // 只要有选中 (排除已投的) 就能确认
  const pendingNew = selectedIds.filter(id => !myTodayVotedIds.includes(id));
  if (pendingNew.length === 0) return;
  const list = document.getElementById('confirm-list');
  list.innerHTML = selectedIds.map(id => {
    const a = ARTISTS.find(x => x.id === id);
    return a ? `<span class="confirm-pill">${a.name}</span>` : '';
  }).join('');
  document.getElementById('confirm-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('confirm-modal').style.display = 'none';
}

async function submitVote() {
  if (VOTE_CLOSED) return;
  // 过滤掉今天已投的, 只投新的
  const pendingNew = selectedIds.filter(id => !myTodayVotedIds.includes(id));
  if (pendingNew.length === 0) {
    closeModal();
    return;
  }

  const submitBtn = document.getElementById('submit-btn');
  submitBtn.textContent = '提交中...';
  submitBtn.disabled = true;

  try {
    const fp = getFingerprint();
    const res = await fetch(API_BASE + '/api/vote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        voted_ids: pendingNew,
        fingerprint: fp,
      }),
    });
    const data = await res.json();

    if (res.ok && data.success) {
      // 锁定今天已投的 id, 清空选择
      const inserted = data.inserted || pendingNew;
      myTodayVotedIds = [...myTodayVotedIds, ...inserted.filter(id => !myTodayVotedIds.includes(id))];
      if (myTodayVotedIds.length > 0) hasAlreadyVoted = true;
      selectedIds = [];
      closeModal();
      renderArtistGrid();
    } else {
      alert(data.error || '投票失败，请重试');
      submitBtn.textContent = '确认投票 ✨';
      submitBtn.disabled = false;
      submitBtn.classList.add('ready');
    }
  } catch (e) {
    alert('网络错误，请检查网络后重试');
    submitBtn.textContent = '确认投票 ✨';
    submitBtn.disabled = false;
    submitBtn.classList.add('ready');
  }
}

document.getElementById('confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ============================================================
// Init
// ============================================================
(async function init() {
  // Show loading state
  isLoading = true;
  renderArtistGrid();

  // Check if already voted (from server)
  await checkVotedStatus();

  // Load artists from API
  const ok = await loadArtistsFromAPI();
  
  // On API failure, no artists to show
  if (!ok) {
    document.getElementById('artist-grid').innerHTML = 
      `<div style="grid-column:1/-1;text-align:center;padding:60px 24px;color:#e86a58;font-size:15px;">
        ⚠️ 加载艺术家数据失败，请刷新页面重试
      </div>`;
    document.getElementById('submit-btn').textContent = '加载失败';
    document.getElementById('submit-btn').disabled = true;
    return;
  }

  // If already voted, set selectedIds from server
  if (hasAlreadyVoted) {
    selectedIds = [...myVotedIds];
  }

  isLoading = false;
  renderArtistGrid();
})();
</script>
